<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Четыре ключа</title>
    <script>
      const path = window.location.pathname;
      const firstSegment = path.split('/').filter(Boolean)[0];
      const base = window.location.hostname.endsWith('github.io') && firstSegment ? `/${firstSegment}/` : '/';
      sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash);
      window.location.replace(base);
    </script>
  </head>
  <body></body>
</html>
